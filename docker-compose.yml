version: '3.9'

services:
  # ── BACKEND ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stamp3d-backend
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./stamp3d.db
      - DEBUG=true
      - ALLOWED_ORIGINS=["http://localhost:5173","http://localhost:3000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FRONTEND ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stamp3d-frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ── REDIS (opcional - para Celery) ────────────────────────────────────────
  # redis:
  #   image: redis:7-alpine
  #   container_name: stamp3d-redis
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped

volumes:
  storage:
    driver: local
